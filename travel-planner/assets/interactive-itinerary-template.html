<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>旅行规划交互模板</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <style>
    :root {
      --bg: #f5f5f1;
      --panel: #ffffff;
      --ink: #202124;
      --muted: #69707a;
      --line: #dedbd2;
      --soft: #ece9df;
      --accent: #0f766e;
      --accent-ink: #064e45;
      --food: #c2410c;
      --drinks: #7c3aed;
      --activities: #2563eb;
      --shopping: #b7791f;
      --lodging: #059669;
      --transport: #475569;
      --prep: #0e7490;
      --shadow: 0 14px 34px rgba(39, 43, 47, .08);
    }
    * { box-sizing: border-box; }
    html { min-height: 100%; }
    body {
      margin: 0;
      min-height: 100%;
      overflow-x: hidden;
      font-family: "Times New Roman", "Microsoft YaHei", serif;
      color: var(--ink);
      background: var(--bg);
      line-height: 1.35;
    }
    button, input, select { font: inherit; }
    button {
      border: 1px solid var(--line);
      background: #fff;
      color: var(--ink);
      border-radius: 8px;
      padding: 8px 10px;
      cursor: pointer;
    }
    button:hover { border-color: var(--accent); }
    button.active {
      border-color: var(--accent);
      background: #e6f3f1;
      color: var(--accent-ink);
      font-weight: 700;
    }
    a { color: var(--accent); text-decoration: none; font-weight: 650; }
    h1, h2, h3, p { margin-top: 0; }
    h1 { margin-bottom: 4px; font-size: clamp(22px, 2.4vw, 32px); letter-spacing: 0; }
    h2 { margin-bottom: 8px; font-size: 15px; letter-spacing: 0; }
    h3 { margin-bottom: 4px; font-size: 13px; letter-spacing: 0; }
    .topbar {
      background: #17332f;
      color: #fff;
      padding: 14px 20px;
    }
    .topbar p { margin-bottom: 10px; color: #dce7e4; max-width: 980px; font-size: 13px; }
    .summary-strip {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 8px;
      max-width: none;
    }
    .summary-pill {
      min-height: 42px;
      border: 1px solid rgba(255,255,255,.22);
      border-radius: 8px;
      padding: 6px 9px;
      background: rgba(255,255,255,.08);
    }
    .summary-pill strong { display: block; font-size: 13px; color: #fff; }
    .summary-pill span { color: #cdd9d6; font-size: 11px; }
    .app {
      max-width: 1440px;
      margin: 0 auto;
      padding: 18px 18px 28px;
    }
    .workspace {
      display: grid;
      grid-template-columns: 300px minmax(0, 1fr) 360px;
      gap: 16px;
      align-items: start;
    }
    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }
    .left,
    .right {
      position: sticky;
      top: 14px;
      max-height: calc(100vh - 28px);
      overflow: auto;
      align-self: start;
    }
    .section { padding: 8px; border-bottom: 1px solid var(--line); }
    .section:last-child { border-bottom: 0; }
    .control-row, .chip-row, .tab-row {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }
    label { display: block; margin-bottom: 3px; color: var(--muted); font-size: 11px; }
    .left .section { padding: 5px 6px; }
    .left h2, .right h2 { font-size: 15px; margin-bottom: 8px; }
    .left button { padding: 8px 10px; font-size: 14px; }
    .left .day-list { grid-template-columns: 1fr; }
    #categoryControls { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 4px; }
    #categoryControls button { min-width: 0; }
    input[type="number"], select {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 6px 8px;
      background: #fff;
      color: var(--ink);
    }
    .field-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 4px; }
    .day-list { display: grid; gap: 6px; }
    .day-card {
      width: 100%;
      text-align: left;
      padding: 8px 10px;
      background: #fff;
      border: 1px solid var(--line);
    }
    .day-card .name { display: block; font-weight: 760; }
    .day-card .meta { display: block; color: var(--muted); font-size: 12px; margin-top: 3px; }
    .map-panel {
      position: sticky;
      top: 14px;
      max-height: calc(100vh - 28px);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .map-sticky {
      flex: 0 0 auto;
      overflow: hidden;
      border-radius: 8px 8px 0 0;
    }
    #map {
      position: static;
      height: 300px;
      min-height: 300px;
      background: #d8e6e1;
      border-bottom: 1px solid var(--line);
      border-radius: 8px 8px 0 0;
    }
    .map-scroll {
      min-height: 0;
      overflow: auto;
      flex: 1 1 auto;
      background: var(--panel);
    }
    .map-fallback {
      height: 100%;
      display: grid;
      place-items: center;
      padding: 20px;
      color: var(--muted);
      text-align: center;
    }
    .route-head {
      position: static;
      padding: 12px 14px;
      display: grid;
      grid-template-columns: minmax(0, 1fr) 180px;
      justify-content: space-between;
      gap: 8px;
      align-items: center;
      border-bottom: 1px solid var(--line);
      background: var(--panel);
    }
    .route-head h2 { margin-bottom: 4px; font-size: 18px; }
    .route-head p { margin-bottom: 0; color: var(--muted); font-size: 13px; }
    .route-meta {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 4px 6px;
      background: #faf9f5;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.35;
    }
    .timeline {
      padding: 14px;
      display: grid;
      grid-template-columns: 1fr;
      gap: 10px;
      align-content: start;
    }
    .stop {
      display: grid;
      grid-template-columns: 58px 32px minmax(0, 1fr);
      gap: 10px;
      align-items: center;
      width: 100%;
      text-align: left;
      border: 1px solid var(--line);
      background: #fff;
      padding: 10px;
    }
    .stop.active { border-color: var(--accent); background: #f0f8f6; }
    .stop.excluded { opacity: .55; }
    .time { color: var(--muted); font-size: 12px; }
    .num {
      width: 18px;
      height: 18px;
      display: grid;
      place-items: center;
      border-radius: 999px;
      background: var(--accent);
      color: #fff;
      font-size: 10px;
      font-weight: 800;
    }
    .stop strong { display: block; font-size: 14px; }
    .stop p { display: block; color: var(--muted); font-size: 12px; margin-bottom: 0; }
    .tag {
      display: inline-flex;
      align-items: center;
      border-radius: 999px;
      padding: 2px 7px;
      margin-right: 6px;
      color: #fff;
      font-size: 11px;
      white-space: nowrap;
    }
    .food { background: var(--food); }
    .drinks { background: var(--drinks); }
    .activities { background: var(--activities); }
    .shopping { background: var(--shopping); color: #1f2937; }
    .lodging { background: var(--lodging); }
    .transport { background: var(--transport); }
    .prep { background: var(--prep); }
    .detail-empty { color: var(--muted); margin-bottom: 0; }
    #detailPanel > p { margin-bottom: 10px; }
    .detail-links {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 10px;
    }
    .detail-links a {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 6px 8px;
      background: #fff;
      font-size: 13px;
    }
    .fact-list {
      display: grid;
      gap: 6px;
      margin-top: 8px;
    }
    .fact {
      border-top: 1px solid var(--line);
      padding-top: 6px;
      font-size: 12px;
      display: block;
      white-space: normal;
    }
    .fact span { display: block; color: var(--muted); font-size: 12px; }
    .budget-lines, .compact-list { display: grid; gap: 8px; }
    .line-item {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      border-bottom: 1px solid var(--line);
      padding-bottom: 6px;
      font-size: 13px;
    }
    .line-item:last-child { border-bottom: 0; }
    .list-item {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 6px 8px;
      background: #fff;
    }
    .list-item p { margin-bottom: 0; color: var(--muted); font-size: 11px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    .activity-chip {
      display: grid;
      grid-template-columns: 16px minmax(0, 1fr);
      align-items: center;
      gap: 4px;
      height: 25px;
      padding: 3px 4px;
      margin: 0;
      min-width: 0;
      color: var(--text);
      font-size: 11px;
    }
    .activity-chip strong,
    .activity-chip p {
      display: block;
      min-width: 0;
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
      margin: 0;
    }
    .activity-chip p { display: none; }
    .activity-chip input { width: 13px; height: 13px; }
    #activityToggles { grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 4px; }
    .source-list {
      margin: 0;
      padding-left: 18px;
      color: var(--muted);
      font-size: 11px;
      columns: 2;
    }
    .source-list li { margin-bottom: 4px; break-inside: avoid; }
    .place-drawer {
      margin-top: 0;
      display: grid;
      grid-template-columns: 1fr;
      gap: 10px;
      max-height: none;
      overflow: visible;
      padding: 14px;
    }
    .map-panel > .section h2 { display: block; padding: 0 14px; }
    .drawer-heading {
      grid-column: 1 / -1;
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0;
    }
    .mini-place {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      padding: 8px;
      text-align: left;
      display: grid;
      grid-template-columns: 30px 72px minmax(0, 1fr) 78px;
      gap: 8px;
      align-items: center;
      min-height: 58px;
    }
    .mini-place.active { border-color: var(--accent); background: #f0f8f6; }
    .mini-place.route-on { box-shadow: inset 4px 0 0 var(--accent); }
    .mini-place.route-off { opacity: .55; }
    .mini-place strong { display: block; margin: 0; }
    .mini-place span { color: var(--muted); font-size: 12px; }
    .mini-place .pick-num {
      width: 18px;
      height: 18px;
      display: grid;
      place-items: center;
      border-radius: 999px;
      background: var(--soft);
      color: var(--ink);
      font-weight: 800;
      font-size: 10px;
    }
    .mini-place .tag {
      width: 100%;
      margin-right: 0;
      justify-content: center;
    }
    .mini-place .pick-main { min-width: 0; }
    .mini-place .pick-main strong,
    .mini-place .pick-main span {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .mini-place .pick-action { color: var(--accent); font-size: 12px; text-align: right; }
    .mini-place .pick-main strong { font-size: 13px; }
    .bottom-info {
      margin-top: 18px;
      display: block;
    }
    .prep-board {
      padding: 14px;
    }
    .prep-board > h2 {
      margin-bottom: 12px;
      font-size: 18px;
    }
    .prep-sections {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }
    .prep-section {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #faf9f5;
      padding: 12px;
      min-width: 0;
    }
    .prep-section h3 {
      font-size: 14px;
      margin-bottom: 8px;
    }
    .prep-section .bottom-grid {
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }
    .bottom-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 8px;
    }
    .info-chip {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 8px 10px;
      background: #fff;
      min-width: 0;
      font-size: 12px;
      white-space: normal;
      overflow: hidden;
    }
    .info-chip strong { display: block; font-size: 12px; }
    .info-chip span { display: block; color: var(--muted); margin-top: 2px; }
    .bottom-info .section { padding: 12px 14px; }
    .bottom-info h2 { margin-bottom: 8px; font-size: 15px; }
    .bottom-info .prep-board > h2 { font-size: 18px; margin-bottom: 12px; }
    .bottom-info .panel { overflow: hidden; }
    .bottom-info .source-list {
      columns: 1;
      padding-left: 15px;
      font-size: 11px;
      line-height: 1.4;
    }
    .bottom-info .source-list li {
      break-inside: avoid;
    }
    @media (max-width: 1180px) {
      .workspace { grid-template-columns: 280px minmax(0, 1fr); }
      .right { position: static; max-height: none; grid-column: 1 / -1; }
      .prep-sections { grid-template-columns: 1fr; }
      .summary-strip { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    }
    @media (max-width: 980px) {
      body { overflow-x: hidden; }
      .topbar { padding: 14px 12px; }
      .topbar p { white-space: normal; font-size: 12px; }
      .summary-strip { grid-template-columns: 1fr; }
      .app { padding: 12px; }
      .workspace {
        display: block;
      }
      .panel {
        margin-bottom: 12px;
        overflow: visible;
      }
      .left,
      .right,
      .map-panel {
        position: static;
        max-height: none;
        overflow: visible;
      }
      .left .section { padding: 10px; }
      .control-row button,
      .tab-row button {
        flex: 1 1 auto;
        min-width: 86px;
      }
      #durationControls.control-row {
        display: grid !important;
        grid-template-columns: 1fr;
        gap: 6px;
        width: 100%;
        max-width: 100%;
      }
      #durationControls button {
        width: 100%;
        min-width: 0;
        max-width: 100%;
      }
      .summary-pill strong,
      .day-card .name {
        overflow-wrap: anywhere;
      }
      #categoryControls {
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 6px;
      }
      .field-grid,
      .place-drawer,
      .bottom-grid,
      .prep-section .bottom-grid {
        grid-template-columns: 1fr;
      }
      .map-panel {
        display: block;
      }
      .map-sticky {
        overflow: visible;
      }
      .map-scroll {
        overflow: visible;
        display: block;
      }
      #map {
        height: 320px;
        min-height: 320px;
        position: static;
      }
      .route-head {
        display: block;
        position: static;
      }
      .route-meta { margin-top: 10px; }
      .timeline { padding: 12px; }
      .stop {
        grid-template-columns: 50px 26px minmax(0, 1fr);
        min-height: 0;
      }
      .place-drawer {
        padding: 12px;
      }
      .mini-place {
        grid-template-columns: 28px 58px minmax(0, 1fr);
        min-height: 56px;
      }
      .mini-place .pick-action { display: none; }
      .mini-place .tag {
        padding-left: 4px;
        padding-right: 4px;
        font-size: 10px;
      }
      .detail-links a {
        flex: 1 1 auto;
        text-align: center;
      }
      .prep-board { padding: 12px; }
      .prep-sections { grid-template-columns: 1fr; }
      .source-list { columns: 1; }
    }
  </style>
</head>
<body>
  <header class="topbar">
    <h1 id="title">旅行规划</h1>
    <p id="subtitle"></p>
    <div class="summary-strip">
      <div class="summary-pill"><span>当前版本</span><strong id="summaryDuration">-</strong></div>
      <div class="summary-pill"><span>建议住宿</span><strong id="summaryBase">-</strong></div>
      <div class="summary-pill"><span>人均预算</span><strong id="summaryCost">-</strong></div>
      <div class="summary-pill"><span>汇率/货币</span><strong id="summaryExchange">-</strong></div>
    </div>
  </header>

  <main class="app">
    <div class="workspace">
    <aside class="panel left">
      <div class="section">
        <h2>行程版本</h2>
        <div class="control-row" id="durationControls"></div>
      </div>
      <div class="section">
        <h2>每日路线</h2>
        <div class="day-list" id="dayList"></div>
      </div>
      <div class="section">
        <h2>筛选</h2>
        <div class="chip-row" id="categoryControls"></div>
      </div>
      <div class="section">
        <h2>预算参数</h2>
        <div class="field-grid">
          <div>
            <label for="groupSize">同行人数</label>
            <input id="groupSize" type="number" min="1" value="2">
          </div>
          <div>
            <label for="lodgingLevel">住宿档位</label>
            <select id="lodgingLevel">
              <option value="budget">经济干净</option>
              <option value="mid" selected>中档舒适</option>
              <option value="comfort">更舒适</option>
            </select>
          </div>
        </div>
      </div>
      <div class="section">
        <h2>可选项目</h2>
        <div class="compact-list" id="activityToggles"></div>
      </div>
    </aside>

    <section class="panel map-panel">
      <div class="map-sticky">
        <div id="map"></div>
        <div class="route-head">
          <div>
            <h2 id="dayTitle">路线</h2>
            <p id="dayLogic"></p>
          </div>
          <div class="route-meta" id="routeMeta"></div>
        </div>
      </div>
      <div class="map-scroll">
        <div class="timeline" id="timeline"></div>
        <div class="section">
          <h2>地点索引</h2>
          <div class="place-drawer" id="placeDrawer"></div>
        </div>
      </div>
    </section>

    <aside class="panel right">
      <div class="section">
        <div class="tab-row" id="detailTabs">
          <button data-panel="place" class="active">地点</button>
          <button data-panel="budget">费用</button>
        </div>
      </div>
      <div class="section" id="detailPanel"></div>
    </aside>
    </div>

    <section class="bottom-info">
      <div class="panel prep-board">
        <h2>准备事项</h2>
        <div class="prep-sections">
          <div class="prep-section">
            <h3>基本事项</h3>
            <div class="bottom-grid" id="bottomPrep"></div>
          </div>
          <div class="prep-section">
            <h3>本地 App</h3>
            <div class="bottom-grid" id="bottomApps"></div>
          </div>
          <div class="prep-section">
            <h3>其他事项</h3>
            <div class="bottom-grid" id="bottomNotes"></div>
          </div>
          <div class="prep-section">
            <h3>信息来源</h3>
            <ol class="source-list" id="bottomSources"></ol>
          </div>
        </div>
      </div>
    </section>
  </main>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script>
    const tripData = {
      destination: "目的地",
      subtitle: "默认按不特种兵的 5 日游规划，并提供 3/5/7 天切换。",
      currency: "当地货币",
      exchangeNote: "替换为当前汇率说明",
      baseArea: "替换为建议住宿区域",
      categories: ["food", "drinks", "activities", "shopping", "lodging", "transport", "prep"],
      categoryLabels: {
        food: "吃",
        drinks: "喝",
        activities: "玩乐",
        shopping: "购物",
        lodging: "住",
        transport: "行",
        prep: "准备"
      },
      costModel: {
        lodgingPerRoomNight: { budget: 120, mid: 180, comfort: 260 },
        foodPerPersonDay: 55,
        drinksPerPersonDay: 25,
        localTransportPerPersonDay: 12,
        bufferPerPersonDay: 15,
        intercityPerPerson: { 3: 0, 5: 0, 7: 0 },
        shoppingAllowance: 0,
        optionalActivities: [
          { id: "sample-activity", name: "示例付费活动", costPerPerson: 60, defaultOn: false }
        ]
      },
      durations: {
        3: { title: "3 天精华版", summary: "压缩最高价值体验", days: [] },
        5: { title: "5 天推荐版", summary: "节奏和深度最均衡", days: [] },
        7: { title: "7 天深入版", summary: "加入慢街区和周边体验", days: [] }
      },
      places: [],
      prep: [],
      apps: [],
      phrases: [],
      notes: [],
      sources: []
    };

    const state = {
      duration: 3,
      dayIndex: 0,
      groupSize: 2,
      lodgingLevel: "mid",
      categories: new Set(tripData.categories),
      selectedPlaceId: null,
      selectedRouteIds: new Set(),
      activePanel: "place",
      optionalActivities: new Set(tripData.costModel.optionalActivities.filter(x => x.defaultOn).map(x => x.id)),
      map: null,
      markers: new Map(),
      route: null
    };

    function money(value) {
      return `${Math.round(value).toLocaleString()} ${tripData.currency}`;
    }

    function getDuration() {
      return tripData.durations[state.duration] || { title: "", summary: "", days: [] };
    }

    function getDays() {
      return getDuration().days || [];
    }

    function getDay() {
      return getDays()[state.dayIndex] || {};
    }

    function normalizeStop(stop) {
      return typeof stop === "string" ? { id: stop } : stop;
    }

    function placeById(id) {
      return tripData.places.find(place => place.id === id);
    }

    function dayStops() {
      return (getDay().stops || []).map(normalizeStop).map(stop => ({
        ...stop,
        place: placeById(stop.id)
      })).filter(stop => stop.place);
    }

    function durationPlaceIds() {
      const ids = new Set();
      getDays().forEach(day => (day.stops || []).map(normalizeStop).forEach(stop => ids.add(stop.id)));
      return ids;
    }

    function visiblePlaces() {
      const ids = durationPlaceIds();
      return tripData.places.filter(place => ids.has(place.id) && state.categories.has(place.category));
    }

    function dayVisibleStops() {
      return dayStops().filter(stop => state.categories.has(stop.place.category));
    }

    function selectedRouteStops() {
      return dayVisibleStops().filter(stop => state.selectedRouteIds.has(stop.id));
    }

    function resetRouteSelection() {
      state.selectedRouteIds = new Set(dayVisibleStops().map(stop => stop.id));
    }

    function selectedPlace() {
      return placeById(state.selectedPlaceId) || selectedRouteStops()[0]?.place || dayVisibleStops()[0]?.place || visiblePlaces()[0] || null;
    }

    function calculateCost() {
      const nights = Math.max(1, state.duration - 1);
      const groupSize = Math.max(1, state.groupSize);
      const c = tripData.costModel;
      const lodging = ((c.lodgingPerRoomNight?.[state.lodgingLevel] || 0) * nights) / groupSize;
      const food = (c.foodPerPersonDay || 0) * state.duration;
      const drinks = (c.drinksPerPersonDay || 0) * state.duration;
      const localTransport = (c.localTransportPerPersonDay || 0) * state.duration;
      const buffer = (c.bufferPerPersonDay || 0) * state.duration;
      const intercity = c.intercityPerPerson?.[state.duration] || 0;
      const shopping = c.shoppingAllowance || 0;
      const optional = (c.optionalActivities || [])
        .filter(item => state.optionalActivities.has(item.id))
        .reduce((sum, item) => sum + (item.costPerPerson || 0), 0);
      const total = lodging + food + drinks + localTransport + buffer + intercity + shopping + optional;
      return { lodging, food, drinks, localTransport, buffer, intercity, shopping, optional, total };
    }

    function setSelectedPlace(id) {
      state.selectedPlaceId = id;
      state.activePanel = "place";
      render();
      const marker = state.markers.get(id);
      if (marker && state.map) marker.openPopup();
    }

    function toggleRoutePlace(id) {
      state.selectedPlaceId = id;
      state.activePanel = "place";
      if (state.selectedRouteIds.has(id)) state.selectedRouteIds.delete(id);
      else state.selectedRouteIds.add(id);
      render();
      const marker = state.markers.get(id);
      if (marker && state.map) marker.openPopup();
    }

    function renderSummary() {
      const cost = calculateCost();
      document.getElementById("title").textContent = `${tripData.destination} 旅行规划`;
      document.getElementById("subtitle").textContent = tripData.subtitle || "";
      document.getElementById("summaryDuration").textContent = getDuration().title || `${state.duration} 天`;
      document.getElementById("summaryBase").textContent = tripData.baseArea || "-";
      document.getElementById("summaryCost").textContent = money(cost.total);
      document.getElementById("summaryExchange").textContent = tripData.exchangeNote || tripData.currency;
    }

    function renderControls() {
      const durationControls = document.getElementById("durationControls");
      durationControls.innerHTML = "";
      Object.keys(tripData.durations).forEach(value => {
        const button = document.createElement("button");
        button.textContent = `${value} 天`;
        button.className = Number(value) === state.duration ? "active" : "";
        button.onclick = () => {
          state.duration = Number(value);
          state.dayIndex = 0;
          state.selectedPlaceId = null;
          resetRouteSelection();
          render();
        };
        durationControls.appendChild(button);
      });

      const dayList = document.getElementById("dayList");
      dayList.innerHTML = "";
      const days = getDays();
      if (!days.length) {
        dayList.innerHTML = `<p class="detail-empty">替换 tripData 后显示每日路线。</p>`;
      }
      days.forEach((day, index) => {
        const button = document.createElement("button");
        button.className = `day-card ${index === state.dayIndex ? "active" : ""}`;
        button.innerHTML = `<span class="name">第 ${index + 1} 天 · ${day.title || "未命名路线"}</span><span class="meta">${day.area || ""}${day.start || day.end ? ` · ${day.start || ""} → ${day.end || ""}` : ""}</span>`;
        button.onclick = () => {
          state.dayIndex = index;
          state.selectedPlaceId = null;
          resetRouteSelection();
          render();
        };
        dayList.appendChild(button);
      });

      const categoryControls = document.getElementById("categoryControls");
      categoryControls.innerHTML = "";
      tripData.categories.forEach(category => {
        const button = document.createElement("button");
        button.textContent = tripData.categoryLabels[category] || category;
        button.className = state.categories.has(category) ? `active ${category}` : "";
        button.onclick = () => {
          state.categories.has(category) ? state.categories.delete(category) : state.categories.add(category);
          state.selectedPlaceId = null;
          resetRouteSelection();
          render();
        };
        categoryControls.appendChild(button);
      });

      document.getElementById("groupSize").value = state.groupSize;
      document.getElementById("groupSize").oninput = event => {
        state.groupSize = Number(event.target.value || 1);
        renderSummary();
        renderDetail();
      };
      document.getElementById("lodgingLevel").value = state.lodgingLevel;
      document.getElementById("lodgingLevel").onchange = event => {
        state.lodgingLevel = event.target.value;
        renderSummary();
        renderDetail();
      };

      const toggles = document.getElementById("activityToggles");
      toggles.innerHTML = "";
      (tripData.costModel.optionalActivities || []).forEach(item => {
        const label = document.createElement("label");
        label.className = "list-item activity-chip";
        label.title = `${item.name} +${money(item.costPerPerson || 0)}`;
        label.innerHTML = `<input type="checkbox" ${state.optionalActivities.has(item.id) ? "checked" : ""}> <span><strong>${item.name} · +${money(item.costPerPerson || 0)}</strong><p></p></span>`;
        label.querySelector("input").onchange = event => {
          event.target.checked ? state.optionalActivities.add(item.id) : state.optionalActivities.delete(item.id);
          renderSummary();
          renderDetail();
        };
        toggles.appendChild(label);
      });
      if (!(tripData.costModel.optionalActivities || []).length) {
        toggles.innerHTML = `<p class="detail-empty">无可选付费项目。</p>`;
      }
    }

    function ensureMap() {
      const mapEl = document.getElementById("map");
      if (state.map || !window.L) {
        if (!window.L) mapEl.innerHTML = `<div class="map-fallback">地图组件未加载，使用下方路线列表。</div>`;
        return;
      }
      state.map = L.map("map", { scrollWheelZoom: true }).setView([35, 135], 11);
      L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
        maxZoom: 19,
        attribution: "&copy; OpenStreetMap contributors"
      }).addTo(state.map);
    }

    function renderMap() {
      ensureMap();
      if (!state.map) return;
      state.markers.forEach(marker => marker.remove());
      state.markers.clear();
      if (state.route) state.route.remove();

      const routeIds = new Set(selectedRouteStops().map(stop => stop.id));
      const places = visiblePlaces().filter(place => place.lat && place.lng);
      const routePoints = selectedRouteStops().map(stop => stop.place).filter(place => place.lat && place.lng);

      places.forEach(place => {
        const color = getComputedStyle(document.documentElement).getPropertyValue(`--${place.category}`).trim() || "#0f766e";
        const marker = L.circleMarker([place.lat, place.lng], {
          radius: routeIds.has(place.id) ? 8 : 5,
          color,
          weight: state.selectedPlaceId === place.id ? 4 : routeIds.has(place.id) ? 3 : 1,
          fillColor: color,
          fillOpacity: routeIds.has(place.id) ? 0.9 : 0.35
        }).addTo(state.map);
        marker.bindPopup(`<strong>${place.name}</strong><br>${tripData.categoryLabels[place.category] || place.category}<br>${place.address || ""}`);
        marker.on("click", () => setSelectedPlace(place.id));
        state.markers.set(place.id, marker);
      });

      const line = routePoints.map(place => [place.lat, place.lng]);
      if (line.length > 1) {
        state.route = L.polyline(line, { color: "#0f766e", weight: 4, opacity: 0.82 }).addTo(state.map);
      }
      const bounds = line.length ? line : places.map(place => [place.lat, place.lng]);
      if (bounds.length) state.map.fitBounds(bounds, { padding: [28, 28] });
    }

    function renderRoute() {
      const day = getDay();
      document.getElementById("dayTitle").textContent = day.title ? `第 ${state.dayIndex + 1} 天 · ${day.title}` : "每日路线";
      document.getElementById("dayLogic").textContent = day.logic || getDuration().summary || "";
      document.getElementById("routeMeta").innerHTML = `
        <strong>${day.area || tripData.baseArea || "-"}</strong><br>
        ${day.start || "-"} → ${day.end || "-"}<br>
        ${day.costNote || ""}
      `;

      const timeline = document.getElementById("timeline");
      timeline.innerHTML = "";
      const visibleCount = dayVisibleStops().length;
      const stops = selectedRouteStops();
      if (!stops.length) {
        timeline.innerHTML = `<p class="detail-empty">当前没有选中路线点。请在下方“地点索引”里多选地点生成路线。</p>`;
        return;
      }
      stops.forEach((stop, index) => {
        const place = stop.place;
        const button = document.createElement("button");
        button.className = `stop ${selectedPlace()?.id === place.id ? "active" : ""}`;
        button.onclick = () => setSelectedPlace(place.id);
        button.innerHTML = `
          <span class="time">${stop.time || place.time || ""}</span>
          <span class="num">${index + 1}</span>
          <span>
            <span class="tag ${place.category}">${tripData.categoryLabels[place.category] || place.category}</span>
            <strong>${place.name}</strong>
            <p>${stop.note || place.why || ""}</p>
          </span>
        `;
        timeline.appendChild(button);
      });
    }

    function link(label, url) {
      return url ? `<a href="${url}" target="_blank" rel="noreferrer">${label}</a>` : "";
    }

    function escapeAttr(value) {
      return String(value || "").replace(/&/g, "&amp;").replace(/"/g, "&quot;").replace(/</g, "&lt;");
    }

    function renderPlaceDrawer() {
      const drawer = document.getElementById("placeDrawer");
      drawer.innerHTML = "";
      const today = dayVisibleStops();
      const todayIds = new Set(today.map(stop => stop.place.id));
      const others = visiblePlaces().filter(place => !todayIds.has(place.id));
      if (!today.length && !others.length) {
        drawer.innerHTML = `<p class="detail-empty">当前筛选下暂无地点。</p>`;
        return;
      }

      function addHeading(text) {
        const heading = document.createElement("div");
        heading.className = "drawer-heading";
        heading.textContent = text;
        drawer.appendChild(heading);
      }

      function addPlace(place, index, meta) {
        const inRoute = state.selectedRouteIds.has(place.id);
        const button = document.createElement("button");
        button.className = `mini-place ${selectedPlace()?.id === place.id ? "active" : ""} ${inRoute ? "route-on" : "route-off"}`;
        button.onclick = () => toggleRoutePlace(place.id);
        button.innerHTML = `
          <span class="pick-num">${inRoute ? "✓" : "+"}</span>
          <span class="tag ${place.category}">${tripData.categoryLabels[place.category] || place.category}</span>
          <span class="pick-main">
            <strong>${place.name}</strong>
            <span>${meta || place.address || place.priceNote || ""}</span>
          </span>
          <span class="pick-action">${inRoute ? "移出路线" : "加入路线"}</span>
        `;
        drawer.appendChild(button);
      }

      if (today.length) {
        addHeading("今天路线");
        today.forEach((stop, index) => addPlace(stop.place, index + 1, stop.time || stop.note || stop.place.why || ""));
      }
      if (others.length) {
        addHeading("本版本其它可选点");
        others.forEach((place, index) => addPlace(place, index + 1, place.address || place.priceNote || place.why || ""));
      }
    }

    function renderBottomInfo() {
      document.getElementById("bottomPrep").innerHTML = (tripData.prep || [])
        .map(item => `<div class="info-chip" title="${item.detail}"><strong>${item.title}</strong><span> · ${item.detail}</span></div>`)
        .join("") || `<p class="detail-empty">暂无准备事项。</p>`;
      document.getElementById("bottomApps").innerHTML = (tripData.apps || [])
        .map(item => `<div class="info-chip" title="${item.use}"><strong>${item.name}</strong><span> · ${item.use}</span></div>`)
        .join("") || `<p class="detail-empty">暂无 App 信息。</p>`;
      document.getElementById("bottomNotes").innerHTML = (tripData.notes || [])
        .map(item => `<div class="info-chip" title="${item.detail}"><strong>${item.title}</strong><span> · ${item.detail}</span></div>`)
        .join("") || `<p class="detail-empty">暂无注意事项。</p>`;
      document.getElementById("bottomSources").innerHTML = (tripData.sources || [])
        .map(item => `<li><a href="${item.url}" target="_blank" rel="noreferrer">${item.label}</a> <span>${item.checked || ""}</span></li>`)
        .join("");
      if (!(tripData.sources || []).length) document.getElementById("bottomSources").innerHTML = `<li>暂无来源。</li>`;
    }

    function renderTabs() {
      document.querySelectorAll("#detailTabs button").forEach(button => {
        button.classList.toggle("active", button.dataset.panel === state.activePanel);
        button.onclick = () => {
          state.activePanel = button.dataset.panel;
          renderDetail();
          renderTabs();
        };
      });
    }

    function renderPlaceDetail(panel) {
      const place = selectedPlace();
      if (!place) {
        panel.innerHTML = `<p class="detail-empty">暂无可显示地点。</p>`;
        return;
      }
      const hoursPrice = [place.hoursNote, place.priceNote].filter(Boolean).join(" · ") || "当前公开来源未找到";
      const evidence = place.evidence || place.sources || "见来源面板";
      const caveat = place.caveat || "无特别注意";
      panel.innerHTML = `
        <span class="tag ${place.category}">${tripData.categoryLabels[place.category] || place.category}</span>
        <h2>${place.name}</h2>
        <p>${place.why || ""}</p>
        <div class="detail-links">
          ${link("官网", place.officialUrl)}
          ${link("预订", place.bookingUrl)}
          ${link("菜单", place.menuUrl)}
          ${link("地图", place.mapUrl)}
          ${link("来源", place.sourceUrl)}
        </div>
        <div class="fact-list">
          <div class="fact" title="${escapeAttr(place.address || "当前公开来源未找到")}"><span>地址</span>${place.address || "当前公开来源未找到"}</div>
          <div class="fact" title="${escapeAttr(place.phone || "当前公开来源未找到")}"><span>电话</span>${place.phone || "当前公开来源未找到"}</div>
          <div class="fact" title="${escapeAttr(hoursPrice)}"><span>营业/价格</span>${hoursPrice}</div>
          <div class="fact" title="${escapeAttr(evidence)}"><span>证据</span>${evidence}</div>
          <div class="fact" title="${escapeAttr(caveat)}"><span>注意</span>${caveat}</div>
        </div>
      `;
    }

    function renderBudget(panel) {
      const c = calculateCost();
      panel.innerHTML = `
        <h2>${money(c.total)}</h2>
        <p class="detail-empty">按 ${state.duration} 天、${Math.max(1, state.groupSize)} 人、${document.getElementById("lodgingLevel").selectedOptions[0]?.textContent || state.lodgingLevel} 估算。</p>
        <div class="budget-lines">
          <div class="line-item"><span>住宿分摊</span><strong>${money(c.lodging)}</strong></div>
          <div class="line-item"><span>吃饭</span><strong>${money(c.food)}</strong></div>
          <div class="line-item"><span>咖啡/酒吧</span><strong>${money(c.drinks)}</strong></div>
          <div class="line-item"><span>市内交通</span><strong>${money(c.localTransport)}</strong></div>
          <div class="line-item"><span>城际/一日游交通</span><strong>${money(c.intercity)}</strong></div>
          <div class="line-item"><span>可选活动</span><strong>${money(c.optional)}</strong></div>
          <div class="line-item"><span>缓冲</span><strong>${money(c.buffer)}</strong></div>
          <div class="line-item"><span>购物预留</span><strong>${money(c.shopping)}</strong></div>
        </div>
      `;
    }

    function renderDetail() {
      const panel = document.getElementById("detailPanel");
      if (state.activePanel === "budget") renderBudget(panel);
      else renderPlaceDetail(panel);
      renderTabs();
    }

    function render() {
      renderSummary();
      renderControls();
      renderRoute();
      renderPlaceDrawer();
      renderMap();
      renderDetail();
      renderBottomInfo();
    }

    resetRouteSelection();
    render();
  </script>
</body>
</html>
