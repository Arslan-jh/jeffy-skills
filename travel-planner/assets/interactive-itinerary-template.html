<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>交互式旅行规划</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <style>
    :root {
      --bg: #f5f5f1;
      --panel: #ffffff;
      --ink: #202124;
      --muted: #69707a;
      --line: #dedbd2;
      --soft: #ece9df;
      --accent: #0f766e;
      --accent-ink: #064e45;
      --food: #c2410c;
      --drinks: #7c3aed;
      --activities: #2563eb;
      --shopping: #b7791f;
      --lodging: #059669;
      --transport: #475569;
      --prep: #0e7490;
      --shadow: 0 14px 34px rgba(39, 43, 47, .08);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Inter, "Segoe UI", "Microsoft YaHei", Arial, sans-serif;
      color: var(--ink);
      background: var(--bg);
      line-height: 1.45;
    }
    button, input, select { font: inherit; }
    button {
      border: 1px solid var(--line);
      background: #fff;
      color: var(--ink);
      border-radius: 8px;
      padding: 8px 10px;
      cursor: pointer;
    }
    button:hover { border-color: var(--accent); }
    button.active {
      border-color: var(--accent);
      background: #e6f3f1;
      color: var(--accent-ink);
      font-weight: 700;
    }
    a { color: var(--accent); text-decoration: none; font-weight: 650; }
    h1, h2, h3, p { margin-top: 0; }
    h1 { margin-bottom: 6px; font-size: clamp(26px, 3vw, 40px); letter-spacing: 0; }
    h2 { margin-bottom: 12px; font-size: 18px; letter-spacing: 0; }
    h3 { margin-bottom: 6px; font-size: 15px; letter-spacing: 0; }
    .topbar {
      background: #17332f;
      color: #fff;
      padding: 20px clamp(16px, 4vw, 42px) 16px;
    }
    .topbar p { margin-bottom: 12px; color: #dce7e4; max-width: 980px; }
    .summary-strip {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
      max-width: 1440px;
    }
    .summary-pill {
      min-height: 68px;
      border: 1px solid rgba(255,255,255,.22);
      border-radius: 8px;
      padding: 10px 12px;
      background: rgba(255,255,255,.08);
    }
    .summary-pill strong { display: block; font-size: 17px; color: #fff; }
    .summary-pill span { color: #cdd9d6; font-size: 12px; }
    .app {
      max-width: 1440px;
      margin: 0 auto;
      padding: 14px clamp(10px, 2vw, 24px) 24px;
      display: grid;
      grid-template-columns: 300px minmax(0, 1fr) 360px;
      gap: 14px;
      align-items: start;
    }
    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
    }
    .left, .right { position: sticky; top: 12px; max-height: calc(100vh - 24px); overflow: auto; }
    .section { padding: 14px; border-bottom: 1px solid var(--line); }
    .section:last-child { border-bottom: 0; }
    .control-row, .chip-row, .tab-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    label { display: block; margin-bottom: 6px; color: var(--muted); font-size: 12px; }
    input[type="number"], select {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 8px 10px;
      background: #fff;
      color: var(--ink);
    }
    .field-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .day-list { display: grid; gap: 8px; }
    .day-card {
      width: 100%;
      text-align: left;
      padding: 10px;
      background: #fff;
      border: 1px solid var(--line);
    }
    .day-card .name { display: block; font-weight: 760; }
    .day-card .meta { display: block; color: var(--muted); font-size: 12px; margin-top: 3px; }
    .map-panel { overflow: hidden; }
    #map {
      height: min(54vh, 520px);
      min-height: 360px;
      background: #d8e6e1;
      border-bottom: 1px solid var(--line);
    }
    .map-fallback {
      height: 100%;
      display: grid;
      place-items: center;
      padding: 20px;
      color: var(--muted);
      text-align: center;
    }
    .route-head {
      padding: 14px 16px;
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: start;
      border-bottom: 1px solid var(--line);
    }
    .route-head p { margin-bottom: 0; color: var(--muted); }
    .route-meta {
      flex: 0 0 auto;
      min-width: 132px;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 8px 10px;
      background: #faf9f5;
      color: var(--muted);
      font-size: 12px;
    }
    .timeline {
      padding: 12px 16px 16px;
      display: grid;
      gap: 8px;
    }
    .stop {
      display: grid;
      grid-template-columns: 56px 28px minmax(0, 1fr);
      gap: 10px;
      align-items: start;
      width: 100%;
      text-align: left;
      border: 1px solid var(--line);
      background: #fff;
      padding: 10px;
    }
    .stop.active { border-color: var(--accent); background: #f0f8f6; }
    .time { color: var(--muted); font-size: 12px; padding-top: 3px; }
    .num {
      width: 26px;
      height: 26px;
      display: grid;
      place-items: center;
      border-radius: 999px;
      background: var(--accent);
      color: #fff;
      font-size: 12px;
      font-weight: 800;
    }
    .stop p { margin: 3px 0 0; color: var(--muted); font-size: 13px; }
    .tag {
      display: inline-flex;
      align-items: center;
      border-radius: 999px;
      padding: 2px 8px;
      margin-right: 6px;
      color: #fff;
      font-size: 12px;
      white-space: nowrap;
    }
    .food { background: var(--food); }
    .drinks { background: var(--drinks); }
    .activities { background: var(--activities); }
    .shopping { background: var(--shopping); color: #1f2937; }
    .lodging { background: var(--lodging); }
    .transport { background: var(--transport); }
    .prep { background: var(--prep); }
    .detail-empty { color: var(--muted); margin-bottom: 0; }
    .detail-links {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 10px;
    }
    .detail-links a {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 6px 8px;
      background: #fff;
    }
    .fact-list {
      display: grid;
      gap: 8px;
      margin-top: 12px;
    }
    .fact {
      border-top: 1px solid var(--line);
      padding-top: 8px;
      font-size: 13px;
    }
    .fact span { display: block; color: var(--muted); font-size: 12px; }
    .budget-lines, .compact-list { display: grid; gap: 8px; }
    .line-item {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      border-bottom: 1px solid var(--line);
      padding-bottom: 8px;
      font-size: 13px;
    }
    .line-item:last-child { border-bottom: 0; }
    .list-item {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 10px;
      background: #fff;
    }
    .list-item p { margin-bottom: 0; color: var(--muted); font-size: 13px; }
    .source-list {
      margin: 0;
      padding-left: 18px;
      color: var(--muted);
      font-size: 13px;
    }
    .source-list li { margin-bottom: 8px; }
    .place-drawer {
      margin-top: 14px;
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
    }
    .mini-place {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      padding: 10px;
      text-align: left;
    }
    .mini-place.active { border-color: var(--accent); background: #f0f8f6; }
    .mini-place strong { display: block; margin: 4px 0; }
    .mini-place span { color: var(--muted); font-size: 12px; }
    @media (max-width: 1180px) {
      .app { grid-template-columns: 280px minmax(0, 1fr); }
      .right { position: static; max-height: none; grid-column: 1 / -1; }
      .summary-strip { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    }
    @media (max-width: 820px) {
      .app { grid-template-columns: 1fr; }
      .left { position: static; max-height: none; }
      .summary-strip, .field-grid, .place-drawer { grid-template-columns: 1fr; }
      #map { height: 360px; min-height: 320px; }
      .route-head { display: block; }
      .route-meta { margin-top: 10px; }
      .stop { grid-template-columns: 50px 26px minmax(0, 1fr); }
    }
  </style>
</head>
<body>
  <header class="topbar">
    <h1 id="title">交互式旅行规划</h1>
    <p id="subtitle"></p>
    <div class="summary-strip">
      <div class="summary-pill"><span>当前版本</span><strong id="summaryDuration">-</strong></div>
      <div class="summary-pill"><span>建议住宿</span><strong id="summaryBase">-</strong></div>
      <div class="summary-pill"><span>人均预算</span><strong id="summaryCost">-</strong></div>
      <div class="summary-pill"><span>汇率/货币</span><strong id="summaryExchange">-</strong></div>
    </div>
  </header>

  <main class="app">
    <aside class="panel left">
      <div class="section">
        <h2>行程版本</h2>
        <div class="control-row" id="durationControls"></div>
      </div>
      <div class="section">
        <h2>每日路线</h2>
        <div class="day-list" id="dayList"></div>
      </div>
      <div class="section">
        <h2>筛选</h2>
        <div class="chip-row" id="categoryControls"></div>
      </div>
      <div class="section">
        <h2>预算参数</h2>
        <div class="field-grid">
          <div>
            <label for="groupSize">同行人数</label>
            <input id="groupSize" type="number" min="1" value="2">
          </div>
          <div>
            <label for="lodgingLevel">住宿档位</label>
            <select id="lodgingLevel">
              <option value="budget">经济干净</option>
              <option value="mid" selected>中档舒适</option>
              <option value="comfort">更舒适</option>
            </select>
          </div>
        </div>
      </div>
      <div class="section">
        <h2>可选项目</h2>
        <div class="compact-list" id="activityToggles"></div>
      </div>
    </aside>

    <section class="panel map-panel">
      <div id="map"></div>
      <div class="route-head">
        <div>
          <h2 id="dayTitle">路线</h2>
          <p id="dayLogic"></p>
        </div>
        <div class="route-meta" id="routeMeta"></div>
      </div>
      <div class="timeline" id="timeline"></div>
      <div class="section">
        <h2>当前筛选地点</h2>
        <div class="place-drawer" id="placeDrawer"></div>
      </div>
    </section>

    <aside class="panel right">
      <div class="section">
        <div class="tab-row" id="detailTabs">
          <button data-panel="place" class="active">地点</button>
          <button data-panel="budget">费用</button>
          <button data-panel="prep">准备</button>
          <button data-panel="sources">来源</button>
        </div>
      </div>
      <div class="section" id="detailPanel"></div>
    </aside>
  </main>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script>
    const tripData = {
      destination: "目的地",
      subtitle: "默认按不特种兵的 5 日游规划，并提供 3/5/7 天切换。",
      currency: "当地货币",
      exchangeNote: "替换为当前汇率说明",
      baseArea: "替换为建议住宿区域",
      categories: ["food", "drinks", "activities", "shopping", "lodging", "transport", "prep"],
      categoryLabels: {
        food: "吃",
        drinks: "喝",
        activities: "玩乐",
        shopping: "购物",
        lodging: "住",
        transport: "行",
        prep: "准备"
      },
      costModel: {
        lodgingPerRoomNight: { budget: 120, mid: 180, comfort: 260 },
        foodPerPersonDay: 55,
        drinksPerPersonDay: 25,
        localTransportPerPersonDay: 12,
        bufferPerPersonDay: 15,
        intercityPerPerson: { 3: 0, 5: 0, 7: 0 },
        shoppingAllowance: 0,
        optionalActivities: [
          { id: "sample-activity", name: "示例付费活动", costPerPerson: 60, defaultOn: false }
        ]
      },
      durations: {
        3: { title: "3 天精华版", summary: "压缩最高价值体验", days: [] },
        5: { title: "5 天推荐版", summary: "节奏和深度最均衡", days: [] },
        7: { title: "7 天深入版", summary: "加入慢街区和周边体验", days: [] }
      },
      places: [],
      prep: [],
      apps: [],
      phrases: [],
      sources: []
    };

    const state = {
      duration: 5,
      dayIndex: 0,
      groupSize: 2,
      lodgingLevel: "mid",
      categories: new Set(tripData.categories),
      selectedPlaceId: null,
      activePanel: "place",
      optionalActivities: new Set(tripData.costModel.optionalActivities.filter(x => x.defaultOn).map(x => x.id)),
      map: null,
      markers: new Map(),
      route: null
    };

    function money(value) {
      return `${Math.round(value).toLocaleString()} ${tripData.currency}`;
    }

    function getDuration() {
      return tripData.durations[state.duration] || { title: "", summary: "", days: [] };
    }

    function getDays() {
      return getDuration().days || [];
    }

    function getDay() {
      return getDays()[state.dayIndex] || {};
    }

    function normalizeStop(stop) {
      return typeof stop === "string" ? { id: stop } : stop;
    }

    function placeById(id) {
      return tripData.places.find(place => place.id === id);
    }

    function dayStops() {
      return (getDay().stops || []).map(normalizeStop).map(stop => ({
        ...stop,
        place: placeById(stop.id)
      })).filter(stop => stop.place);
    }

    function durationPlaceIds() {
      const ids = new Set();
      getDays().forEach(day => (day.stops || []).map(normalizeStop).forEach(stop => ids.add(stop.id)));
      return ids;
    }

    function visiblePlaces() {
      const ids = durationPlaceIds();
      return tripData.places.filter(place => ids.has(place.id) && state.categories.has(place.category));
    }

    function dayVisibleStops() {
      return dayStops().filter(stop => state.categories.has(stop.place.category));
    }

    function selectedPlace() {
      return placeById(state.selectedPlaceId) || dayVisibleStops()[0]?.place || visiblePlaces()[0] || null;
    }

    function calculateCost() {
      const nights = Math.max(1, state.duration - 1);
      const groupSize = Math.max(1, state.groupSize);
      const c = tripData.costModel;
      const lodging = ((c.lodgingPerRoomNight?.[state.lodgingLevel] || 0) * nights) / groupSize;
      const food = (c.foodPerPersonDay || 0) * state.duration;
      const drinks = (c.drinksPerPersonDay || 0) * state.duration;
      const localTransport = (c.localTransportPerPersonDay || 0) * state.duration;
      const buffer = (c.bufferPerPersonDay || 0) * state.duration;
      const intercity = c.intercityPerPerson?.[state.duration] || 0;
      const shopping = c.shoppingAllowance || 0;
      const optional = (c.optionalActivities || [])
        .filter(item => state.optionalActivities.has(item.id))
        .reduce((sum, item) => sum + (item.costPerPerson || 0), 0);
      const total = lodging + food + drinks + localTransport + buffer + intercity + shopping + optional;
      return { lodging, food, drinks, localTransport, buffer, intercity, shopping, optional, total };
    }

    function setSelectedPlace(id) {
      state.selectedPlaceId = id;
      state.activePanel = "place";
      render();
      const marker = state.markers.get(id);
      if (marker && state.map) marker.openPopup();
    }

    function renderSummary() {
      const cost = calculateCost();
      document.getElementById("title").textContent = `${tripData.destination} 旅行规划`;
      document.getElementById("subtitle").textContent = tripData.subtitle || "";
      document.getElementById("summaryDuration").textContent = getDuration().title || `${state.duration} 天`;
      document.getElementById("summaryBase").textContent = tripData.baseArea || "-";
      document.getElementById("summaryCost").textContent = money(cost.total);
      document.getElementById("summaryExchange").textContent = tripData.exchangeNote || tripData.currency;
    }

    function renderControls() {
      const durationControls = document.getElementById("durationControls");
      durationControls.innerHTML = "";
      Object.keys(tripData.durations).forEach(value => {
        const button = document.createElement("button");
        button.textContent = `${value} 天`;
        button.className = Number(value) === state.duration ? "active" : "";
        button.onclick = () => {
          state.duration = Number(value);
          state.dayIndex = 0;
          state.selectedPlaceId = null;
          render();
        };
        durationControls.appendChild(button);
      });

      const dayList = document.getElementById("dayList");
      dayList.innerHTML = "";
      const days = getDays();
      if (!days.length) {
        dayList.innerHTML = `<p class="detail-empty">替换 tripData 后显示每日路线。</p>`;
      }
      days.forEach((day, index) => {
        const button = document.createElement("button");
        button.className = `day-card ${index === state.dayIndex ? "active" : ""}`;
        button.innerHTML = `<span class="name">第 ${index + 1} 天 · ${day.title || "未命名路线"}</span><span class="meta">${day.area || ""}${day.start || day.end ? ` · ${day.start || ""} → ${day.end || ""}` : ""}</span>`;
        button.onclick = () => {
          state.dayIndex = index;
          state.selectedPlaceId = null;
          render();
        };
        dayList.appendChild(button);
      });

      const categoryControls = document.getElementById("categoryControls");
      categoryControls.innerHTML = "";
      tripData.categories.forEach(category => {
        const button = document.createElement("button");
        button.textContent = tripData.categoryLabels[category] || category;
        button.className = state.categories.has(category) ? `active ${category}` : "";
        button.onclick = () => {
          state.categories.has(category) ? state.categories.delete(category) : state.categories.add(category);
          state.selectedPlaceId = null;
          render();
        };
        categoryControls.appendChild(button);
      });

      document.getElementById("groupSize").value = state.groupSize;
      document.getElementById("groupSize").oninput = event => {
        state.groupSize = Number(event.target.value || 1);
        renderSummary();
        renderDetail();
      };
      document.getElementById("lodgingLevel").value = state.lodgingLevel;
      document.getElementById("lodgingLevel").onchange = event => {
        state.lodgingLevel = event.target.value;
        renderSummary();
        renderDetail();
      };

      const toggles = document.getElementById("activityToggles");
      toggles.innerHTML = "";
      (tripData.costModel.optionalActivities || []).forEach(item => {
        const label = document.createElement("label");
        label.className = "list-item";
        label.innerHTML = `<input type="checkbox" ${state.optionalActivities.has(item.id) ? "checked" : ""}> <strong>${item.name}</strong><p>+${money(item.costPerPerson || 0)}</p>`;
        label.querySelector("input").onchange = event => {
          event.target.checked ? state.optionalActivities.add(item.id) : state.optionalActivities.delete(item.id);
          renderSummary();
          renderDetail();
        };
        toggles.appendChild(label);
      });
      if (!(tripData.costModel.optionalActivities || []).length) {
        toggles.innerHTML = `<p class="detail-empty">无可选付费项目。</p>`;
      }
    }

    function ensureMap() {
      const mapEl = document.getElementById("map");
      if (state.map || !window.L) {
        if (!window.L) mapEl.innerHTML = `<div class="map-fallback">地图组件未加载，使用下方路线列表。</div>`;
        return;
      }
      state.map = L.map("map", { scrollWheelZoom: true }).setView([35, 135], 11);
      L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
        maxZoom: 19,
        attribution: "&copy; OpenStreetMap contributors"
      }).addTo(state.map);
    }

    function renderMap() {
      ensureMap();
      if (!state.map) return;
      state.markers.forEach(marker => marker.remove());
      state.markers.clear();
      if (state.route) state.route.remove();

      const dayIds = new Set(dayVisibleStops().map(stop => stop.id));
      const places = visiblePlaces().filter(place => place.lat && place.lng);
      const dayPoints = dayVisibleStops().map(stop => stop.place).filter(place => place.lat && place.lng);

      places.forEach(place => {
        const color = getComputedStyle(document.documentElement).getPropertyValue(`--${place.category}`).trim() || "#0f766e";
        const marker = L.circleMarker([place.lat, place.lng], {
          radius: dayIds.has(place.id) ? 8 : 5,
          color,
          weight: state.selectedPlaceId === place.id ? 4 : 2,
          fillColor: color,
          fillOpacity: 0.86
        }).addTo(state.map);
        marker.bindPopup(`<strong>${place.name}</strong><br>${tripData.categoryLabels[place.category] || place.category}<br>${place.address || ""}`);
        marker.on("click", () => setSelectedPlace(place.id));
        state.markers.set(place.id, marker);
      });

      const line = dayPoints.map(place => [place.lat, place.lng]);
      if (line.length > 1) {
        state.route = L.polyline(line, { color: "#0f766e", weight: 4, opacity: 0.82 }).addTo(state.map);
      }
      const bounds = line.length ? line : places.map(place => [place.lat, place.lng]);
      if (bounds.length) state.map.fitBounds(bounds, { padding: [28, 28] });
    }

    function renderRoute() {
      const day = getDay();
      document.getElementById("dayTitle").textContent = day.title ? `第 ${state.dayIndex + 1} 天 · ${day.title}` : "每日路线";
      document.getElementById("dayLogic").textContent = day.logic || getDuration().summary || "";
      document.getElementById("routeMeta").innerHTML = `
        <strong>${day.area || tripData.baseArea || "-"}</strong><br>
        ${day.start || "-"} → ${day.end || "-"}<br>
        ${day.costNote || ""}
      `;

      const timeline = document.getElementById("timeline");
      timeline.innerHTML = "";
      const stops = dayVisibleStops();
      if (!stops.length) {
        timeline.innerHTML = `<p class="detail-empty">当前天数和筛选条件下暂无路线点。</p>`;
        return;
      }
      stops.forEach((stop, index) => {
        const place = stop.place;
        const button = document.createElement("button");
        button.className = `stop ${selectedPlace()?.id === place.id ? "active" : ""}`;
        button.onclick = () => setSelectedPlace(place.id);
        button.innerHTML = `
          <span class="time">${stop.time || place.time || ""}</span>
          <span class="num">${index + 1}</span>
          <span>
            <span class="tag ${place.category}">${tripData.categoryLabels[place.category] || place.category}</span>
            <strong>${place.name}</strong>
            <p>${stop.note || place.why || ""}</p>
          </span>
        `;
        timeline.appendChild(button);
      });
    }

    function link(label, url) {
      return url ? `<a href="${url}" target="_blank" rel="noreferrer">${label}</a>` : "";
    }

    function renderPlaceDrawer() {
      const drawer = document.getElementById("placeDrawer");
      drawer.innerHTML = "";
      const places = visiblePlaces();
      if (!places.length) {
        drawer.innerHTML = `<p class="detail-empty">当前筛选下暂无地点。</p>`;
        return;
      }
      places.forEach(place => {
        const button = document.createElement("button");
        button.className = `mini-place ${selectedPlace()?.id === place.id ? "active" : ""}`;
        button.onclick = () => setSelectedPlace(place.id);
        button.innerHTML = `<span class="tag ${place.category}">${tripData.categoryLabels[place.category] || place.category}</span><strong>${place.name}</strong><span>${place.address || place.priceNote || ""}</span>`;
        drawer.appendChild(button);
      });
    }

    function renderTabs() {
      document.querySelectorAll("#detailTabs button").forEach(button => {
        button.classList.toggle("active", button.dataset.panel === state.activePanel);
        button.onclick = () => {
          state.activePanel = button.dataset.panel;
          renderDetail();
          renderTabs();
        };
      });
    }

    function renderPlaceDetail(panel) {
      const place = selectedPlace();
      if (!place) {
        panel.innerHTML = `<p class="detail-empty">暂无可显示地点。</p>`;
        return;
      }
      panel.innerHTML = `
        <span class="tag ${place.category}">${tripData.categoryLabels[place.category] || place.category}</span>
        <h2>${place.name}</h2>
        <p>${place.why || ""}</p>
        <div class="detail-links">
          ${link("官网", place.officialUrl)}
          ${link("预订", place.bookingUrl)}
          ${link("菜单", place.menuUrl)}
          ${link("地图", place.mapUrl)}
          ${link("来源", place.sourceUrl)}
        </div>
        <div class="fact-list">
          <div class="fact"><span>地址</span>${place.address || "当前公开来源未找到"}</div>
          <div class="fact"><span>电话</span>${place.phone || "当前公开来源未找到"}</div>
          <div class="fact"><span>营业/价格</span>${[place.hoursNote, place.priceNote].filter(Boolean).join(" · ") || "当前公开来源未找到"}</div>
          <div class="fact"><span>证据</span>${place.evidence || place.sources || "见来源面板"}</div>
          <div class="fact"><span>注意</span>${place.caveat || "无特别注意"}</div>
        </div>
      `;
    }

    function renderBudget(panel) {
      const c = calculateCost();
      panel.innerHTML = `
        <h2>${money(c.total)}</h2>
        <p class="detail-empty">按 ${state.duration} 天、${Math.max(1, state.groupSize)} 人、${document.getElementById("lodgingLevel").selectedOptions[0]?.textContent || state.lodgingLevel} 估算。</p>
        <div class="budget-lines">
          <div class="line-item"><span>住宿分摊</span><strong>${money(c.lodging)}</strong></div>
          <div class="line-item"><span>吃饭</span><strong>${money(c.food)}</strong></div>
          <div class="line-item"><span>咖啡/酒吧</span><strong>${money(c.drinks)}</strong></div>
          <div class="line-item"><span>市内交通</span><strong>${money(c.localTransport)}</strong></div>
          <div class="line-item"><span>城际/一日游交通</span><strong>${money(c.intercity)}</strong></div>
          <div class="line-item"><span>可选活动</span><strong>${money(c.optional)}</strong></div>
          <div class="line-item"><span>缓冲</span><strong>${money(c.buffer)}</strong></div>
          <div class="line-item"><span>购物预留</span><strong>${money(c.shopping)}</strong></div>
        </div>
      `;
    }

    function renderPrep(panel) {
      const prep = (tripData.prep || []).map(item => `<div class="list-item"><strong>${item.title}</strong><p>${item.detail}</p></div>`).join("");
      const apps = (tripData.apps || []).map(item => `<div class="list-item"><strong>${item.name}</strong><p>${item.use}</p></div>`).join("");
      const phrases = (tripData.phrases || []).map(item => `<div class="list-item"><strong>${item.local}</strong><p>${item.pronunciation || ""} ${item.meaning || ""}</p></div>`).join("");
      panel.innerHTML = `
        <h2>准备事项</h2>
        <div class="compact-list">${prep || `<p class="detail-empty">暂无准备事项。</p>`}</div>
        <h2 style="margin-top:16px">本地 App</h2>
        <div class="compact-list">${apps || `<p class="detail-empty">暂无 App 信息。</p>`}</div>
        <h2 style="margin-top:16px">常用语</h2>
        <div class="compact-list">${phrases || `<p class="detail-empty">暂无常用语。</p>`}</div>
      `;
    }

    function renderSources(panel) {
      panel.innerHTML = `
        <h2>已核对来源</h2>
        <ol class="source-list">
          ${(tripData.sources || []).map(item => `<li><a href="${item.url}" target="_blank" rel="noreferrer">${item.label}</a> <span>${item.checked || ""}</span></li>`).join("")}
        </ol>
        ${(tripData.sources || []).length ? "" : `<p class="detail-empty">暂无来源。</p>`}
      `;
    }

    function renderDetail() {
      const panel = document.getElementById("detailPanel");
      if (state.activePanel === "budget") renderBudget(panel);
      else if (state.activePanel === "prep") renderPrep(panel);
      else if (state.activePanel === "sources") renderSources(panel);
      else renderPlaceDetail(panel);
      renderTabs();
    }

    function render() {
      renderSummary();
      renderControls();
      renderRoute();
      renderPlaceDrawer();
      renderMap();
      renderDetail();
    }

    render();
  </script>
</body>
</html>
